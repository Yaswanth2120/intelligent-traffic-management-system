spring:
  application:
    name: feature-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.traffic.feature.model
        spring.json.value.default.type: com.traffic.feature.model.TrafficMetricEvent
        spring.json.use.type.headers: false
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/traffic_platform}
    username: ${POSTGRES_USER:traffic_user}
    password: ${POSTGRES_PASSWORD:traffic_pass}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8081

traffic:
  aggregation:
    window-size-sec: 60
  topics:
    traffic-metrics: traffic_metrics
    aggregated-features: aggregated_features
