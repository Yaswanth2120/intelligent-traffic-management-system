apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-service
  namespace: traffic-platform
  labels:
    app: feature-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feature-service
  template:
    metadata:
      labels:
        app: feature-service
    spec:
      containers:
        - name: feature-service
          image: ghcr.io/yaswanth2120/intelligent-traffic-management-system/feature-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: traffic-platform-config
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: feature-service
  namespace: traffic-platform
spec:
  selector:
    app: feature-service
  ports:
    - port: 8081
      targetPort: 8081
