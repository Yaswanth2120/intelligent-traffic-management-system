spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: orders-route
          uri: forward:/mock/orders
          predicates:
            - Path=/api/orders
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

traffic:
  topics:
    traffic-metrics: traffic_metrics

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080
