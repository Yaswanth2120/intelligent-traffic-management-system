spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: orders-route
          uri: forward:/mock/orders
          predicates:
            - Path=/api/orders
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.traffic.gateway.policy
        spring.json.value.default.type: com.traffic.gateway.policy.TrafficDecisionEvent
        spring.json.use.type.headers: false

traffic:
  enforcement:
    default-limit-rps: 1000
  topics:
    traffic-metrics: traffic_metrics
    traffic-decisions: traffic_decisions

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080
