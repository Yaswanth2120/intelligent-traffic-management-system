apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: traffic-platform
  labels:
    app: ml-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: ghcr.io/yaswanth2120/intelligent-traffic-management-system/ml-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: traffic-platform-config
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: traffic-platform
spec:
  selector:
    app: ml-service
  ports:
    - port: 8000
      targetPort: 8000
