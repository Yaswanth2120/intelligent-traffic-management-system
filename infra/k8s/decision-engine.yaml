apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine
  namespace: traffic-platform
  labels:
    app: decision-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decision-engine
  template:
    metadata:
      labels:
        app: decision-engine
    spec:
      containers:
        - name: decision-engine
          image: ghcr.io/yaswanth2120/intelligent-traffic-management-system/decision-engine:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: traffic-platform-config
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: decision-engine
  namespace: traffic-platform
spec:
  selector:
    app: decision-engine
  ports:
    - port: 8082
      targetPort: 8082
